spring:
  application:
    name: document-vault
  datasource:
    url: jdbc:postgresql://${DB_HOST:aws-0-eu-west-3.pooler.supabase.com}:${DB_PORT:5432}/${DB_NAME:postgres}?sslmode=require
    username: ${DB_USER:postgres.igftkxezlsdqkzrjobux}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

server:
  port: ${SERVER_PORT:8080}

vault:
  cors:
    allowed-origins:
      - http://localhost:3000
      - http://localhost:5173
  jwt:
    secret: ${JWT_SECRET:change-me-to-a-secure-256-bit-secret-key-for-production-use}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  storage:
    endpoint: ${STORAGE_ENDPOINT:http://localhost:9000}
    access-key: ${STORAGE_ACCESS_KEY:minioadmin}
    secret-key: ${STORAGE_SECRET_KEY:minioadmin}
    bucket: ${STORAGE_BUCKET:vault-assets}
    region: ${STORAGE_REGION:}
    presigned-url-expiry-seconds: ${STORAGE_PRESIGNED_EXPIRY:3600}
    auto-create-bucket: ${STORAGE_AUTO_CREATE_BUCKET:true}
  ai:
    enabled: ${AI_ENABLED:true}
    default-provider: ${AI_PROVIDER:openai}
    fallback-api-key: ${OPENAI_TOKEN:}
    openai:
      base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
      model: ${OPENAI_MODEL:gpt-4o-mini}
      timeout-seconds: ${OPENAI_TIMEOUT_SECONDS:60}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

logging:
  level:
    com.example.vault: INFO
